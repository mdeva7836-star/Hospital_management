{% extends 'base.html' %}
{% block content %}
    <h2>Delete Record</h2>
    <p style="margin: 20px 0;">Are you absolutely sure you want to remove the record for <strong>{{ patient.name }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'patient_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
