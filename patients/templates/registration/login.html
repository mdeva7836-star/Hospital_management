{% extends 'base.html' %}
{% block content %}
    <h2>Login to Account</h2>
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="margin-top: 15px;">Login</button>
    </form>
    <p style="margin-top:15px;">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
{% endblock %}
